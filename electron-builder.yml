appId: com.aibeavers.beaverbuddy
productName: Beaver Buddy
directories:
  output: release
files:
  - dist/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.utilities
  minimumSystemVersion: '14.0'
  target: dmg
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
nsis:
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
